<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推特媒体下载器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
    <style>
        /* Banner */
        .banner-card {
            background: linear-gradient(135deg, rgba(74, 108, 247, 0.08), rgba(123, 97, 255, 0.08));
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            border: 1px solid rgba(74, 108, 247, 0.15);
        }
        .banner-content {
            flex: 1;
        }
        .banner-title {
            font-size: 28px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 8px;
        }
        .banner-subtitle {
            font-size: 15px;
            color: #6B7280;
            line-height: 1.6;
        }
        .banner-illustration {
            width: 200px;
            flex-shrink: 0;
        }
        .banner-illustration svg {
            width: 100%;
            height: auto;
        }
        
        /* 输入区域 */
        .input-section {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(229, 231, 235, 0.5);
            box-shadow: 
                0 4px 6px -1px rgba(74, 108, 247, 0.1),
                0 2px 4px -2px rgba(74, 108, 247, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            padding: 32px;
            margin-bottom: 24px;
        }
        .input-wrapper {
            display: flex;
            gap: 24px;
        }
        .input-field-wrapper {
            flex: 1;
        }
        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #4B5563;
            margin-bottom: 12px;
        }
        .input-label svg {
            color: #4A6CF7;
        }
        .input-icon-wrapper {
            position: relative;
            width: 380px;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 16px;
            font-weight: 600;
        }
        .input-field {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 36px;
            border: 1.5px solid rgba(229, 231, 235, 0.8);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            color: #1F2937;
            outline: none;
            transition: all 0.25s ease;
            font-family: inherit;
        }
        .input-field:hover {
            border-color: rgba(74, 108, 247, 0.4);
        }
        .input-field:focus {
            border-color: #4A6CF7;
            box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.08), 0 2px 8px rgba(74, 108, 247, 0.1);
        }
        .input-field::placeholder {
            color: #9CA3AF;
        }
        .input-field:disabled {
            background: #F3F4F6;
            cursor: not-allowed;
        }
        
        /* 类型选择器 */
        .type-selector {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            background: rgba(249, 250, 251, 0.6);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        .type-option {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            color: #6B7280;
            border: 1.5px solid transparent;
        }
        .type-option:hover {
            background: rgba(74, 108, 247, 0.06);
            color: #4A6CF7;
        }
        .type-option.active {
            background: rgba(74, 108, 247, 0.1);
            color: #4A6CF7;
            border-color: rgba(74, 108, 247, 0.3);
        }
        .type-option input {
            display: none;
        }
        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #D1D5DB;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .custom-checkbox svg {
            width: 12px;
            height: 12px;
            opacity: 0;
            color: white;
            transition: opacity 0.2s ease;
        }
        .type-option.active .custom-checkbox {
            background: #4A6CF7;
            border-color: #4A6CF7;
        }
        .type-option.active .custom-checkbox svg {
            opacity: 1;
        }
        .type-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(74, 108, 247, 0.1);
            border-radius: 8px;
        }
        .type-icon svg {
            width: 18px;
            height: 18px;
            color: #4A6CF7;
        }
        
        /* 下载按钮 */
        .download-btn {
            width: 180px;
            height: 48px;
            padding: 0 32px;
            background: linear-gradient(135deg, #4A6CF7, #7B61FF);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(74, 108, 247, 0.25);
            align-self: flex-end;
        }
        .download-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #3B5DE7, #6B51E0);
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.35);
            transform: translateY(-1px);
        }
        .download-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(74, 108, 247, 0.25);
        }
        .download-btn:disabled {
            background: #EDE9FE;
            cursor: not-allowed;
            box-shadow: none;
            color: #8B7FD7;
        }
        .download-btn.loading {
            background: linear-gradient(135deg, #4A6CF7, #7B61FF);
            opacity: 0.85;
            cursor: wait;
        }
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        /* 进度区域 */
        .progress-section {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(229, 231, 235, 0.5);
            box-shadow: 
                0 4px 6px -1px rgba(74, 108, 247, 0.1),
                0 2px 4px -2px rgba(74, 108, 247, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            padding: 32px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }
        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .progress-title {
            font-size: 18px;
            font-weight: 600;
            color: #1F2937;
        }
        .progress-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-pending {
            background: #FEF3C7;
            color: #D97706;
        }
        .status-downloading {
            background: #DBEAFE;
            color: #2563EB;
        }
        .status-completed {
            background: #D1FAE5;
            color: #059669;
        }
        .status-failed {
            background: #FEE2E2;
            color: #DC2626;
        }
        .progress-bar-wrapper {
            margin-bottom: 20px;
        }
        .progress-bar-bg {
            height: 12px;
            background: #E5E7EB;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4A6CF7, #7B61FF);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        .progress-percentage {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #4A6CF7;
            margin-top: 12px;
        }
        .progress-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .progress-item {
            text-align: center;
            padding: 16px;
            background: rgba(249, 250, 251, 0.8);
            border-radius: 10px;
        }
        .progress-item-label {
            font-size: 12px;
            color: #9CA3AF;
            margin-bottom: 4px;
        }
        .progress-item-value {
            font-size: 20px;
            font-weight: 700;
            color: #1F2937;
        }
        .download-complete-btn {
            width: 100%;
            height: 48px;
            margin-top: 20px;
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .download-complete-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        }
        .error-message {
            margin-top: 16px;
            padding: 16px;
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 10px;
            color: #DC2626;
            font-size: 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .error-message svg {
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        /* 使用说明 */
        .guide-section {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(229, 231, 235, 0.5);
            box-shadow: 
                0 4px 6px -1px rgba(74, 108, 247, 0.1),
                0 2px 4px -2px rgba(74, 108, 247, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            padding: 32px;
        }
        .guide-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 24px;
        }
        .guide-steps {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .guide-step {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            background: rgba(249, 250, 251, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(229, 231, 235, 0.5);
            transition: all 0.2s ease;
        }
        .guide-step:hover {
            background: rgba(249, 250, 251, 0.9);
            transform: translateY(-2px);
        }
        .step-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(74, 108, 247, 0.1), rgba(123, 97, 255, 0.1));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .step-icon svg {
            width: 20px;
            height: 20px;
            color: #4A6CF7;
        }
        .step-content h4 {
            font-size: 15px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 6px;
        }
        .step-content p {
            font-size: 13px;
            color: #6B7280;
            line-height: 1.5;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .banner-card {
                flex-direction: column;
                text-align: center;
                padding: 24px;
            }
            .banner-title {
                font-size: 22px;
            }
            .banner-illustration {
                width: 150px;
            }
            .input-section {
                padding: 20px;
            }
            .input-wrapper {
                flex-direction: column;
                gap: 16px;
            }
            .input-icon-wrapper {
                width: 100%;
            }
            .download-btn {
                width: 100%;
            }
            .progress-section,
            .guide-section {
                padding: 20px;
            }
            .guide-steps {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    {% raw %}
    <div id="app">
        <bg-decoration></bg-decoration>
        <navbar active-page="home"></navbar>
        
        <!-- 主内容 -->
        <div class="main-container" style="max-width: 800px;">
            <!-- Banner -->
            <div class="banner-card">
                <div class="banner-content">
                    <h1 class="banner-title">推特媒体下载器</h1>
                    <p class="banner-subtitle">一键下载用户的所有图文视频，支持批量下载与分类打包</p>
                </div>
                <div class="banner-illustration">
                    <svg viewBox="0 0 200 160" fill="none">
                        <rect x="60" y="20" width="80" height="90" rx="8" stroke="#4A6CF7" stroke-width="2" fill="rgba(74,108,247,0.05)"/>
                        <path d="M100 45v35m0 0l-12-12m12 12l12-12" stroke="#4A6CF7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M75 95h50" stroke="#4A6CF7" stroke-width="2" stroke-linecap="round"/>
                        <rect x="30" y="60" width="25" height="20" rx="3" stroke="#7B61FF" stroke-width="1.5" fill="rgba(123,97,255,0.05)"/>
                        <circle cx="38" cy="68" r="3" stroke="#7B61FF" stroke-width="1.5"/>
                        <path d="M32 76l6-4 4 3 6-5 5 4" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="145" y="55" width="25" height="25" rx="3" stroke="#00D4FF" stroke-width="1.5" fill="rgba(0,212,255,0.05)"/>
                        <path d="M152 62l5 5m0-5l-5 5" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M150 74l3-2 2 1.5 3-2.5 3 2" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M20 130c30-10 60 5 90-5s60 10 70 0" stroke="#4A6CF7" stroke-width="1" opacity="0.2"/>
                    </svg>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="input-section">
                <div class="input-wrapper">
                    <div class="input-field-wrapper">
                        <div class="input-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            推特用户ID
                        </div>
                        <div class="input-icon-wrapper">
                            <span class="input-icon">@</span>
                            <input 
                                type="text" 
                                class="input-field" 
                                v-model="userId" 
                                placeholder="多个用户用逗号分隔，如：user1,user2,user3"
                                :disabled="isDownloading"
                                @keyup.enter="startDownload"
                            >
                        </div>
                        <div class="type-selector">
                            <label 
                                class="type-option" 
                                :class="{ active: downloadTypes.includes('video') }"
                            >
                                <input 
                                    type="checkbox" 
                                    v-model="downloadTypes" 
                                    value="video"
                                    :disabled="isDownloading"
                                >
                                <span class="custom-checkbox">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"/>
                                    </svg>
                                </span>
                                <span class="type-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polygon points="23 7 16 12 23 17 23 7"/>
                                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                                    </svg>
                                </span>
                                视频
                            </label>
                            <label 
                                class="type-option" 
                                :class="{ active: downloadTypes.includes('image') }"
                            >
                                <input 
                                    type="checkbox" 
                                    v-model="downloadTypes" 
                                    value="image"
                                    :disabled="isDownloading"
                                >
                                <span class="custom-checkbox">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"/>
                                    </svg>
                                </span>
                                <span class="type-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                        <circle cx="8.5" cy="8.5" r="1.5"/>
                                        <polyline points="21 15 16 10 5 21"/>
                                    </svg>
                                </span>
                                图片
                            </label>
                        </div>
                    </div>
                    <button 
                        class="download-btn"
                        :class="{ loading: isDownloading }"
                        :disabled="!userId.trim() || downloadTypes.length === 0 || isDownloading"
                        @click="startDownload"
                    >
                        <span v-if="isDownloading" class="btn-spinner"></span>
                        <svg v-else width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        {{ isDownloading ? '正在下载...' : '开始下载' }}
                    </button>
                </div>
            </div>
            
            <!-- 下载进度 -->
            <div v-if="taskId" class="progress-section">
                <div class="progress-header">
                    <h3 class="progress-title">下载进度</h3>
                    <span class="progress-status" :class="'status-' + status">{{ statusText }}</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" :style="{ width: progress + '%' }"></div>
                    </div>
                    <div class="progress-percentage">{{ progress }}%</div>
                </div>
                <div class="progress-info">
                    <div class="progress-item">
                        <div class="progress-item-label">已下载</div>
                        <div class="progress-item-value">{{ downloadedFiles }}</div>
                    </div>
                    <div class="progress-item">
                        <div class="progress-item-label">总文件数</div>
                        <div class="progress-item-value">{{ totalFiles }}</div>
                    </div>
                    <div class="progress-item">
                        <div class="progress-item-label">耗时</div>
                        <div class="progress-item-value">{{ elapsedTime }}</div>
                    </div>
                </div>
                <button v-if="status === 'completed'" class="download-complete-btn" @click="downloadZip">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载ZIP压缩包
                </button>
                <div v-if="status === 'failed' && errorMessage" class="error-message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    {{ errorMessage }}
                </div>
            </div>
            
            <!-- 使用说明 -->
            <div class="guide-section">
                <h2 class="guide-title">
                    <el-icon style="color: #4A6CF7;"><Warning /></el-icon>
                    使用说明
                </h2>
                <div class="guide-steps">
                    <div class="guide-step">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                        </div>
                        <div class="step-content">
                            <h4>输入用户ID</h4>
                            <p>输入推特用户名，多个用户用逗号分隔</p>
                        </div>
                    </div>
                    <div class="guide-step">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path d="M2 17l10 5 10-5"/>
                                <path d="M2 12l10 5 10-5"/>
                            </svg>
                        </div>
                        <div class="step-content">
                            <h4>选择类型</h4>
                            <p>选择下载视频、图片或全部</p>
                        </div>
                    </div>
                    <div class="guide-step">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                            </svg>
                        </div>
                        <div class="step-content">
                            <h4>开始下载</h4>
                            <p>点击按钮开始下载，支持批量下载</p>
                        </div>
                    </div>
                    <div class="guide-step">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                        </div>
                        <div class="step-content">
                            <h4>获取文件</h4>
                            <p>下载完成后获取ZIP压缩包</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endraw %}

    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue;
        
        const app = createApp({
            setup() {
                const userId = ref('');
                const taskId = ref('');
                const status = ref('pending');
                const progress = ref(0);
                const totalFiles = ref(0);
                const downloadedFiles = ref(0);
                const elapsedTime = ref('0秒');
                const errorMessage = ref('');
                const isDownloading = ref(false);
                const downloadTypes = ref(['video', 'image']);
                
                let progressInterval = null;
                let timeInterval = null;
                let startTime = null;
                
                const statusText = computed(() => getStatusText(status.value));
                
                const updateElapsedTime = () => {
                    if (!startTime) return;
                    const diff = Math.floor((new Date() - startTime) / 1000);
                    elapsedTime.value = formatElapsedTime(diff);
                };
                
                const stopTimers = () => {
                    if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
                    if (timeInterval) { clearInterval(timeInterval); timeInterval = null; }
                };
                
                const fetchProgress = async () => {
                    if (!taskId.value) return;
                    try {
                        const response = await fetch(`/api/progress/${taskId.value}`);
                        const data = await response.json();
                        if (response.ok) {
                            status.value = data.status;
                            progress.value = data.progress;
                            totalFiles.value = data.total_files;
                            downloadedFiles.value = data.downloaded_files;
                            errorMessage.value = data.error_message || '';
                            if (data.status === 'completed' || data.status === 'failed') {
                                isDownloading.value = false;
                                stopTimers();
                            }
                        }
                    } catch (error) {
                        console.error('请求失败:', error);
                    }
                };
                
                const startDownload = async () => {
                    if (!userId.value.trim()) {
                        ElementPlus.ElMessage.warning('请输入用户ID');
                        return;
                    }
                    if (downloadTypes.value.length === 0) {
                        ElementPlus.ElMessage.warning('请选择下载类型');
                        return;
                    }
                    isDownloading.value = true;
                    status.value = 'pending';
                    progress.value = 0;
                    totalFiles.value = 0;
                    downloadedFiles.value = 0;
                    errorMessage.value = '';
                    elapsedTime.value = '0秒';
                    startTime = new Date();
                    
                    let downloadType = 'all';
                    if (downloadTypes.value.includes('video') && !downloadTypes.value.includes('image')) {
                        downloadType = 'video';
                    } else if (!downloadTypes.value.includes('video') && downloadTypes.value.includes('image')) {
                        downloadType = 'image';
                    }
                    
                    try {
                        const response = await fetch('/api/download', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                user_id: userId.value.trim(),
                                download_type: downloadType
                            })
                        });
                        const data = await response.json();
                        if (response.ok) {
                            if (data.task_id) {
                                taskId.value = data.task_id;
                                status.value = 'downloading';
                                progressInterval = setInterval(fetchProgress, 1000);
                                timeInterval = setInterval(updateElapsedTime, 1000);
                            } else if (data.tasks && data.tasks.length > 0) {
                                ElementPlus.ElMessage.success(data.message);
                                isDownloading.value = false;
                                setTimeout(() => {
                                    window.location.href = '/history';
                                }, 1500);
                                return;
                            }
                            ElementPlus.ElMessage.success(data.message);
                        } else {
                            ElementPlus.ElMessage.error(data.error || '下载失败');
                            isDownloading.value = false;
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('请求失败: ' + error.message);
                        isDownloading.value = false;
                    }
                };
                
                const downloadZip = () => {
                    if (taskId.value) window.location.href = `/api/download/${taskId.value}`;
                };
                
                onUnmounted(() => stopTimers());
                
                return {
                    userId, taskId, status, progress, totalFiles, downloadedFiles,
                    elapsedTime, errorMessage, isDownloading, statusText, downloadTypes,
                    startDownload, downloadZip
                };
            }
        });
        
        app.use(ElementPlus);
        // 注册所有图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        registerGlobalComponents(app);
        app.mount('#app');
    </script>
</body>
</html>
