<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推特媒体下载器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .main-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header-section {
            background: linear-gradient(135deg, #1da1f2 0%, #0d8ecf 100%);
            padding: 30px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }
        .header-section h1 {
            color: white;
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .header-section p {
            color: rgba(255,255,255,0.9);
            margin: 10px 0 0 0;
            font-size: 14px;
        }
        .content-section {
            padding: 30px;
        }
        .progress-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .download-btn {
            height: 50px;
            font-size: 16px;
            border-radius: 12px;
        }
        .info-card {
            margin-top: 20px;
        }
        .feature-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .feature-list li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .feature-list li:last-child {
            border-bottom: none;
        }
        .feature-icon {
            width: 24px;
            height: 24px;
            background: #1da1f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: white;
            font-size: 12px;
            flex-shrink: 0;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .nav-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }
        .nav-links a.active {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    {% raw %}
    <div id="app">
        <el-row justify="center">
            <el-col :xs="24" :sm="20" :md="16" :lg="12" :xl="10">
                <div class="nav-links">
                    <a href="/" class="active">首页</a>
                    <a href="/config">配置管理</a>
                    <a href="/history">下载历史</a>
                </div>
                
                <el-card class="main-card" :body-style="{ padding: '0' }">
                    <template #header>
                        <div class="header-section">
                            <h1>推特媒体下载器</h1>
                            <p>一键下载用户的所有图文视频</p>
                        </div>
                    </template>
                    
                    <div class="content-section">
                        <el-form @submit.prevent="startDownload">
                            <el-form-item label="推特用户ID">
                                <el-input
                                    v-model="userId"
                                    placeholder="请输入推特用户名（@后面的字符）"
                                    size="large"
                                    :disabled="isDownloading"
                                    clearable
                                >
                                    <template #prefix>
                                        <span>@</span>
                                    </template>
                                </el-input>
                            </el-form-item>
                            
                            <el-form-item>
                                <el-button
                                    type="primary"
                                    class="download-btn"
                                    style="width: 100%"
                                    size="large"
                                    :loading="isDownloading"
                                    :disabled="!userId.trim()"
                                    @click="startDownload"
                                >
                                    {{ isDownloading ? '下载中...' : '开始下载' }}
                                </el-button>
                            </el-form-item>
                        </el-form>
                        
                        <!-- 下载进度 -->
                        <div v-if="taskId" class="progress-card">
                            <el-descriptions title="下载进度" :column="2" border>
                                <el-descriptions-item label="状态">
                                    <el-tag :type="statusTagType">{{ statusText }}</el-tag>
                                </el-descriptions-item>
                                <el-descriptions-item label="进度">
                                    <el-progress 
                                        :percentage="progress" 
                                        :status="progressStatus"
                                        :stroke-width="10"
                                    />
                                </el-descriptions-item>
                                <el-descriptions-item label="已下载文件">
                                    {{ downloadedFiles }} / {{ totalFiles }}
                                </el-descriptions-item>
                                <el-descriptions-item label="已用时间">
                                    {{ elapsedTime }}
                                </el-descriptions-item>
                            </el-descriptions>
                            
                            <el-alert
                                v-if="errorMessage"
                                :title="errorMessage"
                                type="error"
                                show-icon
                                :closable="false"
                                style="margin-top: 16px"
                            />
                            
                            <el-button
                                v-if="status === 'completed'"
                                type="success"
                                size="large"
                                style="width: 100%; margin-top: 16px"
                                @click="downloadZip"
                            >
                                下载压缩包
                            </el-button>
                        </div>
                    </div>
                </el-card>
                
                <el-card class="info-card">
                    <template #header>
                        <div style="font-weight: 600">使用说明</div>
                    </template>
                    <ul class="feature-list">
                        <li>
                            <div class="feature-icon">1</div>
                            <span>输入推特用户名（@后面的字符）</span>
                        </li>
                        <li>
                            <div class="feature-icon">2</div>
                            <span>点击"开始下载"按钮</span>
                        </li>
                        <li>
                            <div class="feature-icon">3</div>
                            <span>等待下载完成，期间可以看到下载进度</span>
                        </li>
                        <li>
                            <div class="feature-icon">4</div>
                            <span>下载完成后点击"下载压缩包"按钮保存文件</span>
                        </li>
                    </ul>
                </el-card>
            </el-col>
        </el-row>
    </div>
    {% endraw %}

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
