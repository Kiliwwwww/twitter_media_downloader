<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推特媒体下载器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card mt-5">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">推特媒体下载器</h3>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="userId" class="form-label">推特用户ID</label>
                                <div class="input-group">
                                    <span class="input-group-text">@</span>
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="userId" 
                                        v-model="userId" 
                                        placeholder="请输入推特用户名（@后面的字符）"
                                        :disabled="isDownloading"
                                    >
                                </div>
                                <div class="form-text">输入用户名后，点击下载按钮开始下载该用户的所有图文视频</div>
                            </div>
                            
                            <button 
                                class="btn btn-primary btn-lg w-100" 
                                @click="startDownload"
                                :disabled="!userId.trim() || isDownloading"
                            >
                                <span v-if="isDownloading" class="spinner-border spinner-border-sm me-2"></span>
                                {{ isDownloading ? '下载中...' : '开始下载' }}
                            </button>
                            
                            <!-- 下载进度 -->
                            <div v-if="taskId" class="mt-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h5 class="mb-0">下载进度</h5>
                                    </div>
                                    <div class="card-body">
                                        <div class="mb-3">
                                            <div class="d-flex justify-content-between mb-1">
                                                <span>状态: {{ statusText }}</span>
                                                <span>{{ progress }}%</span>
                                            </div>
                                            <div class="progress">
                                                <div 
                                                    class="progress-bar" 
                                                    :class="progressBarClass"
                                                    role="progressbar" 
                                                    :style="{ width: progress + '%' }"
                                                    :aria-valuenow="progress" 
                                                    aria-valuemin="0" 
                                                    aria-valuemax="100"
                                                ></div>
                                            </div>
                                        </div>
                                        
                                        <div class="row">
                                            <div class="col-6">
                                                <p class="mb-1"><strong>已下载文件:</strong></p>
                                                <p>{{ downloadedFiles }} / {{ totalFiles }}</p>
                                            </div>
                                            <div class="col-6">
                                                <p class="mb-1"><strong>已用时间:</strong></p>
                                                <p>{{ elapsedTime }}</p>
                                            </div>
                                        </div>
                                        
                                        <div v-if="errorMessage" class="alert alert-danger">
                                            {{ errorMessage }}
                                        </div>
                                        
                                        <div v-if="status === 'completed'" class="mt-3">
                                            <a 
                                                :href="'/api/download/' + taskId" 
                                                class="btn btn-success btn-lg w-100"
                                                download
                                            >
                                                下载压缩包
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5 class="mb-0">使用说明</h5>
                        </div>
                        <div class="card-body">
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item">1. 输入推特用户名（@后面的字符）</li>
                                <li class="list-group-item">2. 点击"开始下载"按钮</li>
                                <li class="list-group-item">3. 等待下载完成，期间可以看到下载进度</li>
                                <li class="list-group-item">4. 下载完成后点击"下载压缩包"按钮保存文件</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
