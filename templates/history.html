<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载历史 - 推特媒体下载器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .main-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header-section {
            background: linear-gradient(135deg, #1da1f2 0%, #0d8ecf 100%);
            padding: 30px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }
        .header-section h1 {
            color: white;
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .header-section p {
            color: rgba(255,255,255,0.9);
            margin: 10px 0 0 0;
            font-size: 14px;
        }
        .content-section {
            padding: 30px;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .nav-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }
        .nav-links a.active {
            background: rgba(255,255,255,0.3);
        }
        .pagination-section {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    {% raw %}
    <div id="app">
        <el-row justify="center">
            <el-col :xs="24" :sm="20" :md="16" :lg="14" :xl="12">
                <div class="nav-links">
                    <a href="/">首页</a>
                    <a href="/config">配置管理</a>
                    <a href="/history" class="active">下载历史</a>
                </div>
                
                <el-card class="main-card" :body-style="{ padding: '0' }">
                    <template #header>
                        <div class="header-section">
                            <h1>下载历史</h1>
                            <p>查看之前的下载记录</p>
                        </div>
                    </template>
                    
                    <div class="content-section">
                        <div v-if="!loading && history.length === 0" class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无下载记录</p>
                            <el-button type="primary" @click="goHome">去下载</el-button>
                        </div>
                        
                        <template v-else>
                            <el-table 
                                :data="history" 
                                style="width: 100%"
                                v-loading="loading"
                            >
                                <el-table-column prop="user_id" label="用户ID" min-width="100" />
                                <el-table-column prop="user_name" label="用户名" min-width="100">
                                    <template #default="scope">
                                        {{ scope.row.user_name || '-' }}
                                    </template>
                                </el-table-column>
                                <el-table-column prop="status" label="状态" width="90">
                                    <template #default="scope">
                                        <el-tag :type="getStatusType(scope.row.status)" size="small">
                                            {{ getStatusText(scope.row.status) }}
                                        </el-tag>
                                    </template>
                                </el-table-column>
                                <el-table-column label="文件数" width="80">
                                    <template #default="scope">
                                        {{ scope.row.downloaded_files || 0 }}/{{ scope.row.total_files || 0 }}
                                    </template>
                                </el-table-column>
                                <el-table-column prop="created_at" label="创建时间" width="150" />
                                <el-table-column label="操作" width="130" fixed="right">
                                    <template #default="scope">
                                        <el-button 
                                            v-if="scope.row.status === 'completed' && scope.row.zip_path"
                                            type="primary" 
                                            size="small"
                                            link
                                            @click="downloadFile(scope.row.task_id)"
                                        >
                                            下载
                                        </el-button>
                                        <el-button 
                                            type="danger" 
                                            size="small"
                                            link
                                            @click="deleteHistory(scope.row.task_id)"
                                        >
                                            删除
                                        </el-button>
                                    </template>
                                </el-table-column>
                            </el-table>
                            
                            <div class="pagination-section" v-if="total > pageSize">
                                <el-pagination
                                    v-model:current-page="currentPage"
                                    :page-size="pageSize"
                                    :total="total"
                                    layout="prev, pager, next, total"
                                    @current-change="fetchHistory"
                                />
                            </div>
                        </template>
                    </div>
                </el-card>
            </el-col>
        </el-row>
    </div>
    {% endraw %}

    <script>
        const { createApp, ref, onMounted } = Vue;
        
        const app = createApp({
            setup() {
                const history = ref([]);
                const loading = ref(false);
                const currentPage = ref(1);
                const pageSize = ref(20);
                const total = ref(0);
                
                const getStatusType = (status) => {
                    switch (status) {
                        case 'pending': return 'warning';
                        case 'downloading': return '';
                        case 'completed': return 'success';
                        case 'failed': return 'danger';
                        default: return 'info';
                    }
                };
                
                const getStatusText = (status) => {
                    switch (status) {
                        case 'pending': return '等待中';
                        case 'downloading': return '下载中';
                        case 'completed': return '已完成';
                        case 'failed': return '失败';
                        default: return '未知';
                    }
                };
                
                const fetchHistory = async (page = 1) => {
                    loading.value = true;
                    try {
                        const response = await fetch(`/api/history?page=${page}&per_page=${pageSize.value}`);
                        const data = await response.json();
                        
                        history.value = data.data || [];
                        total.value = data.total || 0;
                        currentPage.value = data.page || 1;
                    } catch (error) {
                        ElementPlus.ElMessage.error('获取历史记录失败');
                        history.value = [];
                    } finally {
                        loading.value = false;
                    }
                };
                
                const downloadFile = (taskId) => {
                    window.location.href = `/api/download/${taskId}`;
                };
                
                const deleteHistory = async (taskId) => {
                    try {
                        await ElementPlus.ElMessageBox.confirm('确定要删除这条记录吗？', '确认删除', {
                            confirmButtonText: '确定',
                            cancelButtonText: '取消',
                            type: 'warning'
                        });
                        
                        const response = await fetch(`/api/history/${taskId}`, {
                            method: 'DELETE'
                        });
                        
                        if (response.ok) {
                            ElementPlus.ElMessage.success('已删除');
                            fetchHistory(currentPage.value);
                        } else {
                            ElementPlus.ElMessage.error('删除失败');
                        }
                    } catch (error) {
                        if (error !== 'cancel') {
                            ElementPlus.ElMessage.error('删除失败');
                        }
                    }
                };
                
                const goHome = () => {
                    window.location.href = '/';
                };
                
                onMounted(() => {
                    fetchHistory();
                });
                
                return {
                    history,
                    loading,
                    currentPage,
                    pageSize,
                    total,
                    getStatusType,
                    getStatusText,
                    fetchHistory,
                    downloadFile,
                    deleteHistory,
                    goHome
                };
            }
        });
        
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
