<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - 推特媒体下载器</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
</head>
<body>
    {% raw %}
    <div id="app">
        <bg-decoration></bg-decoration>
        <navbar active-page="profile"></navbar>
        
        <!-- 主内容 -->
        <div class="main-container" style="max-width: 700px;">
            <page-header 
                title="个人资料" 
                subtitle="管理您的账号信息和偏好设置"
                icon="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"
            ></page-header>
            
            <!-- 头像和基本信息 -->
            <div class="profile-card">
                <div class="avatar-section">
                    <div class="avatar-wrapper">
                        <img v-if="profile.avatar_url" :src="profile.avatar_url" :alt="profile.nickname"
                             @error="$event.target.style.display='none'; $event.target.nextElementSibling.style.display='flex'" />
                        <span v-else class="avatar-fallback">{{ (profile.nickname || profile.username || '?').charAt(0).toUpperCase() }}</span>
                    </div>
                    <div class="avatar-info">
                        <h3>{{ profile.nickname || profile.username }}</h3>
                        <p>@{{ profile.username }}</p>
                        <span class="role-tag" :class="profile.role">{{ profile.role === 'admin' ? '管理员' : '普通用户' }}</span>
                    </div>
                </div>
                
                <h3 class="profile-card-title">
                    <el-icon><User /></el-icon>
                    基本信息
                </h3>
                
                <div class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                昵称
                            </label>
                            <input 
                                type="text" 
                                class="form-input" 
                                v-model="profile.nickname"
                                placeholder="请输入昵称"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                    <polyline points="22,6 12,13 2,6"/>
                                </svg>
                                邮箱
                            </label>
                            <input 
                                type="email" 
                                class="form-input" 
                                v-model="profile.email"
                                placeholder="请输入邮箱"
                            >
                        </div>
                    </div>
                    
                    <button 
                        class="save-btn"
                        :disabled="savingProfile"
                        @click="saveProfile"
                    >
                        <span v-if="savingProfile" class="spinner"></span>
                        <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        {{ savingProfile ? '保存中...' : '保存资料' }}
                    </button>
                </div>
            </div>
            
            <!-- 推特ID配置 -->
            <div class="profile-card">
                <h3 class="profile-card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/>
                    </svg>
                    推特ID配置
                </h3>
                
                <div class="profile-form">
                    <div class="form-group">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            推特用户名
                        </label>
                        <div class="twitter-input-row">
                            <input 
                                type="text" 
                                class="form-input" 
                                v-model="profile.twitter_id"
                                placeholder="请输入您的推特用户名（不带@）"
                            >
                            <button 
                                class="fetch-avatar-btn"
                                :disabled="fetchingAvatar || !profile.twitter_id"
                                @click="fetchAvatar"
                            >
                                <svg v-if="fetchingAvatar" class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                </svg>
                                <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/>
                                </svg>
                                {{ fetchingAvatar ? '获取中...' : '获取头像' }}
                            </button>
                        </div>
                        <div class="form-hint">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                            设置推特用户名后，系统将自动获取您的推特头像
                        </div>
                    </div>
                    
                    <button 
                        class="save-btn"
                        :disabled="savingTwitter"
                        @click="saveTwitterId"
                    >
                        <span v-if="savingTwitter" class="spinner"></span>
                        <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        {{ savingTwitter ? '保存中...' : '保存推特ID' }}
                    </button>
                </div>
            </div>
            
            <!-- 修改密码 -->
            <div class="profile-card">
                <h3 class="profile-card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    修改密码
                </h3>
                
                <div class="profile-form">
                    <div class="form-group">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                            当前密码
                        </label>
                        <input 
                            type="password" 
                            class="form-input" 
                            v-model="passwordForm.oldPassword"
                            placeholder="请输入当前密码"
                        >
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                                </svg>
                                新密码
                            </label>
                            <input 
                                type="password" 
                                class="form-input" 
                                v-model="passwordForm.newPassword"
                                placeholder="至少6个字符"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                                </svg>
                                确认新密码
                            </label>
                            <input 
                                type="password" 
                                class="form-input" 
                                v-model="passwordForm.confirmPassword"
                                placeholder="再次输入新密码"
                            >
                        </div>
                    </div>
                    
                    <button 
                        class="save-btn"
                        :disabled="savingPassword"
                        @click="changePassword"
                    >
                        <span v-if="savingPassword" class="spinner"></span>
                        <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        {{ savingPassword ? '保存中...' : '修改密码' }}
                    </button>
                </div>
            </div>
        </div>
    </div>
    {% endraw %}

    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        
        const app = createApp({
            setup() {
                const profile = reactive({
                    id: null,
                    username: '',
                    nickname: '',
                    email: '',
                    twitter_id: '',
                    avatar_url: '',
                    role: 'user'
                });
                
                const passwordForm = reactive({
                    oldPassword: '',
                    newPassword: '',
                    confirmPassword: ''
                });
                
                const savingProfile = ref(false);
                const savingTwitter = ref(false);
                const savingPassword = ref(false);
                const fetchingAvatar = ref(false);
                
                const fetchProfile = async () => {
                    try {
                        const response = await fetch('/api/profile');
                        if (response.ok) {
                            const data = await response.json();
                            Object.assign(profile, data);
                        } else if (response.status === 401) {
                            window.location.href = '/login';
                        }
                    } catch (error) {
                        console.error('获取资料失败:', error);
                    }
                };
                
                const saveProfile = async () => {
                    savingProfile.value = true;
                    try {
                        const response = await fetch('/api/profile', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nickname: profile.nickname,
                                email: profile.email
                            })
                        });
                        
                        if (response.ok) {
                            ElementPlus.ElMessage.success('资料已保存');
                        } else {
                            const data = await response.json();
                            ElementPlus.ElMessage.error(data.error || '保存失败');
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('保存失败');
                    } finally {
                        savingProfile.value = false;
                    }
                };
                
                const saveTwitterId = async () => {
                    savingTwitter.value = true;
                    try {
                        const response = await fetch('/api/profile/twitter-id', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                twitter_id: profile.twitter_id
                            })
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            if (data.avatar_url) {
                                profile.avatar_url = data.avatar_url;
                            }
                            ElementPlus.ElMessage.success('推特ID已保存');
                        } else {
                            const data = await response.json();
                            ElementPlus.ElMessage.error(data.error || '保存失败');
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('保存失败');
                    } finally {
                        savingTwitter.value = false;
                    }
                };
                
                const fetchAvatar = async () => {
                    if (!profile.twitter_id) return;
                    
                    fetchingAvatar.value = true;
                    try {
                        const response = await fetch(`/api/avatar/${encodeURIComponent(profile.twitter_id)}`);
                        if (response.ok) {
                            const data = await response.json();
                            if (data.avatar_url) {
                                profile.avatar_url = data.avatar_url;
                                // 同时更新到后端
                                await fetch('/api/profile/twitter-id', {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ twitter_id: profile.twitter_id })
                                });
                                ElementPlus.ElMessage.success('头像已更新');
                            } else {
                                ElementPlus.ElMessage.warning('未找到该用户的头像');
                            }
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('获取头像失败');
                    } finally {
                        fetchingAvatar.value = false;
                    }
                };
                
                const changePassword = async () => {
                    if (!passwordForm.oldPassword || !passwordForm.newPassword || !passwordForm.confirmPassword) {
                        ElementPlus.ElMessage.warning('请填写所有密码字段');
                        return;
                    }
                    
                    if (passwordForm.newPassword.length < 6) {
                        ElementPlus.ElMessage.warning('新密码长度不能少于6个字符');
                        return;
                    }
                    
                    if (passwordForm.newPassword !== passwordForm.confirmPassword) {
                        ElementPlus.ElMessage.warning('两次输入的密码不一致');
                        return;
                    }
                    
                    savingPassword.value = true;
                    try {
                        const response = await fetch('/api/profile/password', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                old_password: passwordForm.oldPassword,
                                new_password: passwordForm.newPassword,
                                confirm_password: passwordForm.confirmPassword
                            })
                        });
                        
                        if (response.ok) {
                            ElementPlus.ElMessage.success('密码已修改');
                            passwordForm.oldPassword = '';
                            passwordForm.newPassword = '';
                            passwordForm.confirmPassword = '';
                        } else {
                            const data = await response.json();
                            ElementPlus.ElMessage.error(data.error || '修改失败');
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('修改失败');
                    } finally {
                        savingPassword.value = false;
                    }
                };
                
                onMounted(() => {
                    fetchProfile();
                });
                
                return {
                    profile,
                    passwordForm,
                    savingProfile,
                    savingTwitter,
                    savingPassword,
                    fetchingAvatar,
                    saveProfile,
                    saveTwitterId,
                    fetchAvatar,
                    changePassword
                };
            }
        });
        
        app.use(ElementPlus);
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        registerGlobalComponents(app);
        app.mount('#app');
    </script>
</body>
</html>
