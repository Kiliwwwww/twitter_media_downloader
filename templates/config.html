<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理 - 推特媒体下载器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
    <style>
        /* 配置卡片 */
        .config-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(229, 231, 235, 0.5);
            box-shadow: 
                0 4px 6px -1px rgba(74, 108, 247, 0.1),
                0 2px 4px -2px rgba(74, 108, 247, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            padding: 32px;
            animation: fadeIn 0.3s ease;
        }
        
        .config-item {
            margin-bottom: 28px;
            padding: 20px;
            background: rgba(249, 250, 251, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(229, 231, 235, 0.3);
            transition: all 0.3s ease;
        }
        .config-item:hover {
            background: rgba(249, 250, 251, 0.9);
            border-color: rgba(74, 108, 247, 0.2);
        }
        .config-item:last-of-type {
            margin-bottom: 24px;
        }
        
        .label-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .label-row label {
            font-weight: 600;
            color: #1F2937;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .label-icon {
            width: 20px;
            height: 20px;
            color: #4A6CF7;
        }
        
        .config-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #1F2937;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            outline: none;
            resize: vertical;
        }
        .config-input:focus {
            border-color: #4A6CF7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.15);
        }
        .config-input::placeholder {
            color: #9CA3AF;
        }
        textarea.config-input {
            min-height: 80px;
            line-height: 1.6;
        }
        
        .config-hint {
            color: #9CA3AF;
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .config-hint svg {
            width: 14px;
            height: 14px;
        }
        
        /* 提示标签 */
        .tip-wrapper {
            position: relative;
            display: inline-flex;
            margin-left: 8px;
        }
        .tip-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: linear-gradient(135deg, rgba(74, 108, 247, 0.1), rgba(123, 97, 255, 0.1));
            border-radius: 6px;
            font-size: 12px;
            color: #4A6CF7;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tip-tag:hover {
            background: linear-gradient(135deg, rgba(74, 108, 247, 0.2), rgba(123, 97, 255, 0.2));
            transform: translateY(-1px);
        }
        .tip-tag svg {
            width: 14px;
            height: 14px;
        }
        .tip-content {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 280px;
            padding: 16px;
            background: white;
            border-radius: 12px;
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.1),
                0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(229, 231, 235, 0.5);
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }
        .tip-wrapper:hover .tip-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .tip-content-title {
            font-size: 13px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 10px;
        }
        .tip-content-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .tip-content-list li {
            font-size: 12px;
            color: #6B7280;
            padding: 4px 0;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .tip-content-list li::before {
            content: '';
            width: 4px;
            height: 4px;
            background: #4A6CF7;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        
        /* 保存按钮 */
        .save-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #4A6CF7 0%, #7B61FF 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
        }
        .save-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.4);
        }
        .save-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }
        .save-btn:disabled {
            background: linear-gradient(135deg, #9CA3AF 0%, #B0B8C4 100%);
            cursor: not-allowed;
            box-shadow: none;
        }
        .save-btn .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .config-card {
                padding: 20px;
            }
            .config-item {
                padding: 16px;
                margin-bottom: 20px;
            }
            .label-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                margin-bottom: 10px;
            }
            .label-row label {
                font-size: 13px;
            }
            .tip-wrapper {
                margin-left: 0;
            }
            .tip-content {
                width: 240px;
                left: 0;
            }
            .config-input {
                padding: 10px 14px;
                font-size: 13px;
            }
            .config-hint {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    {% raw %}
    <div id="app">
        <bg-decoration></bg-decoration>
        <navbar active-page="config"></navbar>
        
        <!-- 主内容 -->
        <div class="main-container">
            <page-header 
                title="配置管理" 
                subtitle="管理代理、Cookie等配置信息"
                icon="M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"
            ></page-header>
            
            <!-- 配置卡片 -->
            <div class="config-card" v-loading="loading">
                <div v-for="(cfg, index) in configList" :key="cfg.key" class="config-item">
                    <div class="label-row">
                        <label>
                            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/>
                            </svg>
                            {{ cfg.description || cfg.key }}
                        </label>
                        <div v-if="cfg.key === 'auth_token' || cfg.key === 'ct0'" class="tip-wrapper">
                            <span class="tip-tag">
                                <el-icon><Warning /></el-icon>
                                如何获取？
                            </span>
                            <div class="tip-content">
                                <div class="tip-content-title">获取方式：</div>
                                <ul class="tip-content-list">
                                    <li>登录 twitter.com</li>
                                    <li>打开浏览器开发者工具 (F12)</li>
                                    <li>切换到 Application/存储 标签</li>
                                    <li>在 Cookies 中找到 twitter.com</li>
                                    <li>分别复制 auth_token 和 ct0 的值</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <input
                        class="config-input"
                        v-model="configList[index].value"
                        :placeholder="cfg.key === 'auth_token' ? '请输入auth_token值' : (cfg.key === 'ct0' ? '请输入ct0值' : '请输入' + (cfg.description || cfg.key))"
                        @keyup.enter="saveConfigs"
                    >
                    <div v-if="cfg.updated_at" class="config-hint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        最后更新: {{ cfg.updated_at }}
                    </div>
                </div>
                
                <button 
                    class="save-btn"
                    :disabled="saving"
                    @click="saveConfigs"
                >
                    <span v-if="saving" class="btn-spinner"></span>
                    <svg v-else width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    {{ saving ? '保存中...' : '保存配置' }}
                </button>
            </div>
        </div>
    </div>
    {% endraw %}

    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script>
        const { createApp, ref, onMounted } = Vue;
        
        const app = createApp({
            setup() {
                const configList = ref([]);
                const loading = ref(false);
                const saving = ref(false);
                
                const fetchConfigs = async () => {
                    loading.value = true;
                    try {
                        const response = await fetch('/api/configs');
                        const data = await response.json();
                        configList.value = data;
                    } catch (error) {
                        ElementPlus.ElMessage.error('获取配置失败');
                    } finally {
                        loading.value = false;
                    }
                };
                
                const saveConfigs = async () => {
                    saving.value = true;
                    try {
                        const data = {};
                        configList.value.forEach(cfg => {
                            data[cfg.key] = cfg.value;
                        });
                        
                        const response = await fetch('/api/configs', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                        
                        if (response.ok) {
                            ElementPlus.ElMessage.success('配置已保存');
                            fetchConfigs();
                        } else {
                            ElementPlus.ElMessage.error('保存失败');
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('保存失败: ' + error.message);
                    } finally {
                        saving.value = false;
                    }
                };
                
                onMounted(() => fetchConfigs());
                
                return { configList, loading, saving, saveConfigs };
            }
        });
        
        app.use(ElementPlus);
        // 注册所有图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        registerGlobalComponents(app);
        app.mount('#app');
    </script>
</body>
</html>
