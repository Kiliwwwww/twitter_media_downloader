<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理 - 推特媒体下载器</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/config.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
</head>
<body>
    {% raw %}
    <div id="app">
        <bg-decoration></bg-decoration>
        <navbar active-page="config"></navbar>
        
        <!-- 主内容 -->
        <div class="main-container">
            <page-header 
                :title="t('config.title')" 
                :subtitle="t('config.subtitle')"
                icon="<circle cx='12' cy='12' r='3'/><path d='M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83'/>"
            ></page-header>
            
            <!-- 配置卡片 -->
            <div class="config-card" v-loading="loading">
                <div v-for="(cfg, index) in configList" :key="cfg.key" class="config-item">
                    <div class="label-row">
                        <label>
                            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/>
                            </svg>
                            {{ cfg.description || cfg.key }}
                        </label>
                        <div v-if="cfg.key === 'auth_token' || cfg.key === 'ct0'" class="tip-wrapper">
                            <span class="tip-tag">
                                <el-icon><Warning /></el-icon>
                                {{ t('config.howToGet') }}
                            </span>
                            <div class="tip-content">
                                <div class="tip-content-title">{{ t('config.howToGetTitle') }}</div>
                                <ul class="tip-content-list">
                                    <li v-for="step in t('config.howToGetSteps')" :key="step">{{ step }}</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <input
                        class="config-input"
                        v-model="configList[index].value"
                        :placeholder="cfg.key === 'auth_token' ? t('config.authTokenPlaceholder') : (cfg.key === 'ct0' ? t('config.ct0Placeholder') : t('config.inputPlaceholder') + (cfg.description || cfg.key))"
                        @keyup.enter="saveConfigs"
                    >
                    <div v-if="cfg.updated_at" class="config-hint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        {{ t('config.lastUpdated') }}{{ cfg.updated_at }}
                    </div>
                </div>
                
                <button 
                    class="save-btn"
                    :disabled="saving"
                    @click="saveConfigs"
                >
                    <span v-if="saving" class="btn-spinner"></span>
                    <svg v-else width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    {{ saving ? t('config.saving') : t('config.saveConfig') }}
                </button>
            </div>
        </div>
    </div>
    {% endraw %}

    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script>
        const { createApp, ref, onMounted } = Vue;
        
        const t = (key, params) => i18n.t(key, params);
        
        const app = createApp({
            setup() {
                const configList = ref([]);
                const loading = ref(false);
                const saving = ref(false);
                
                const fetchConfigs = async () => {
                    loading.value = true;
                    try {
                        const response = await fetch('/api/configs');
                        const data = await response.json();
                        configList.value = data;
                    } catch (error) {
                        ElementPlus.ElMessage.error(t('config.fetchFailed'));
                    } finally {
                        loading.value = false;
                    }
                };
                
                const saveConfigs = async () => {
                    saving.value = true;
                    try {
                        const data = {};
                        configList.value.forEach(cfg => {
                            data[cfg.key] = cfg.value;
                        });
                        
                        const response = await fetch('/api/configs', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                        
                        if (response.ok) {
                            ElementPlus.ElMessage.success(t('config.configSaved'));
                            fetchConfigs();
                        } else {
                            ElementPlus.ElMessage.error(t('config.saveFailed'));
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error(t('config.saveFailed') + ': ' + error.message);
                    } finally {
                        saving.value = false;
                    }
                };
                
                onMounted(() => fetchConfigs());
                
                return { configList, loading, saving, saveConfigs, t };
            }
        });
        
        app.use(ElementPlus);
        // 注册所有图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        registerGlobalComponents(app);
        i18n.init().then(() => {
            app.mount('#app');
        });
    </script>
</body>
</html>
