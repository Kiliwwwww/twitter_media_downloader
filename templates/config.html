<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理 - 推特媒体下载器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .main-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header-section {
            background: linear-gradient(135deg, #1da1f2 0%, #0d8ecf 100%);
            padding: 30px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }
        .header-section h1 {
            color: white;
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .header-section p {
            color: rgba(255,255,255,0.9);
            margin: 10px 0 0 0;
            font-size: 14px;
        }
        .content-section {
            padding: 30px;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .nav-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }
        .nav-links a.active {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    {% raw %}
    <div id="app">
        <el-row justify="center">
            <el-col :xs="24" :sm="20" :md="16" :lg="12" :xl="10">
                <div class="nav-links">
                    <a href="/">首页</a>
                    <a href="/config" class="active">配置管理</a>
                    <a href="/history">下载历史</a>
                </div>
                
                <el-card class="main-card" :body-style="{ padding: '0' }">
                    <template #header>
                        <div class="header-section">
                            <h1>配置管理</h1>
                            <p>管理代理、Cookie等配置信息</p>
                        </div>
                    </template>
                    
                    <div class="content-section">
                        <el-form 
                            :model="configs" 
                            label-position="top"
                            v-loading="loading"
                        >
                            <el-form-item 
                                v-for="config in configs" 
                                :key="config.key"
                                :label="config.description || config.key"
                            >
                                <el-input
                                    v-if="config.key === 'cookie'"
                                    v-model="configs[config.key]"
                                    type="textarea"
                                    :rows="3"
                                    placeholder="请输入Cookie"
                                />
                                <el-input
                                    v-else
                                    v-model="configs[config.key]"
                                    :placeholder="'请输入' + (config.description || config.key)"
                                />
                                <div v-if="config.updated_at" style="color: #909399; font-size: 12px; margin-top: 4px">
                                    最后更新: {{ config.updated_at }}
                                </div>
                            </el-form-item>
                            
                            <el-form-item>
                                <el-button 
                                    type="primary" 
                                    style="width: 100%"
                                    size="large"
                                    :loading="saving"
                                    @click="saveConfigs"
                                >
                                    保存配置
                                </el-button>
                            </el-form-item>
                        </el-form>
                    </div>
                </el-card>
            </el-col>
        </el-row>
    </div>
    {% endraw %}

    <script>
        const { createApp, ref, onMounted } = Vue;
        
        const app = createApp({
            setup() {
                const configs = ref({});
                const loading = ref(false);
                const saving = ref(false);
                
                const fetchConfigs = async () => {
                    loading.value = true;
                    try {
                        const response = await fetch('/api/configs');
                        const data = await response.json();
                        
                        // 转换为key-value对象
                        const configObj = {};
                        data.forEach(item => {
                            configObj[item.key] = item.value;
                            configObj[item.key + '_updated'] = item.updated_at;
                        });
                        configs.value = configObj;
                    } catch (error) {
                        ElementPlus.ElMessage.error('获取配置失败');
                    } finally {
                        loading.value = false;
                    }
                };
                
                const saveConfigs = async () => {
                    saving.value = true;
                    try {
                        // 提取key-value数据
                        const data = {};
                        Object.keys(configs.value).forEach(key => {
                            if (!key.endsWith('_updated')) {
                                data[key] = configs.value[key];
                            }
                        });
                        
                        const response = await fetch('/api/configs', {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(data)
                        });
                        
                        if (response.ok) {
                            ElementPlus.ElMessage.success('配置已保存');
                            fetchConfigs(); // 刷新数据
                        } else {
                            ElementPlus.ElMessage.error('保存失败');
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('保存失败: ' + error.message);
                    } finally {
                        saving.value = false;
                    }
                };
                
                onMounted(() => {
                    fetchConfigs();
                });
                
                return {
                    configs,
                    loading,
                    saving,
                    saveConfigs
                };
            }
        });
        
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
